name: Deploy Backend to Google Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "ERSBackend/**"
      - ".github/workflows/deploy-backend-cloudrun.yml"
  workflow_dispatch:

env:
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: ers-backend
  ARTIFACT_REPO: ers

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ERSBackend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Package
        run: mvn -B -DskipTests package

  deploy:
    name: Build image & Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe "${{ env.ARTIFACT_REPO }}" \
            --location="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            || gcloud artifacts repositories create "${{ env.ARTIFACT_REPO }}" \
              --repository-format=docker \
              --location="${{ env.REGION }}" \
              --description="ERS container images" \
              --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Build and push image
        working-directory: ERSBackend
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}
        run: |
          docker build -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          NEON_JDBC_URL: ${{ secrets.NEON_JDBC_URL }}
          NEON_DB_USER: ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          BACKEND_PUBLIC_URL: ${{ secrets.BACKEND_PUBLIC_URL }}
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="${IMAGE}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=3 \
            --session-affinity \
            --timeout=300 \
            --set-env-vars="^|^SPRING_PROFILES_ACTIVE=prod|SPRING_DATASOURCE_URL=${NEON_JDBC_URL}|SPRING_DATASOURCE_USERNAME=${NEON_DB_USER}|SPRING_DATASOURCE_PASSWORD=${NEON_DB_PASSWORD}|SPRING_JPA_DEFAULT_SCHEMA=public|SPRING_JPA_HIBERNATE_DDL_AUTO=update|ERS_CORS_ALLOWED_ORIGINS=${FRONTEND_ORIGIN}|ERS_API_SERVER_URL=${BACKEND_PUBLIC_URL}|ERS_VENDOR_PROVIDER=mock-sap|SERVER_SERVLET_SESSION_COOKIE_SECURE=true|SERVER_SERVLET_SESSION_COOKIE_SAME_SITE=none"

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)')
          echo "### Backend deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service URL: ${URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health: ${URL}/actuator/health" >> "$GITHUB_STEP_SUMMARY"
          echo "- Swagger UI: ${URL}/swagger-ui.html" >> "$GITHUB_STEP_SUMMARY"
          echo "- OpenAPI: ${URL}/v3/api-docs" >> "$GITHUB_STEP_SUMMARY"
          echo "- Metrics: ${URL}/actuator/metrics" >> "$GITHUB_STEP_SUMMARY"
