# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# Designed for Google Cloud Run + Neon PostgreSQL

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Neon uses the public schema by default; set SPRING_JPA_DEFAULT_SCHEMA to override
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_DEFAULT_SCHEMA:public}
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# Cloud Run terminates TLS; cookies must be Secure + SameSite=None for cross-origin FE
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none
server.forward-headers-strategy=framework

# Restrict Swagger in production (enable explicitly via env for demos)
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}

# Expose health + metrics for Cloud Run / monitoring; keep details limited
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

logging.level.root=INFO
logging.level.com.reimbursement=INFO
logging.level.org.hibernate.SQL=WARN
