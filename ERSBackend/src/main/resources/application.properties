spring.application.name=ERSBackend

spring.datasource.url=jdbc:postgresql://localhost:5432/reimbursement
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true


# Specify what DB schema we're pointing to
spring.jpa.properties.hibernate.default_schema=reimbursement_schema

# This will create a new schema if it doesn't exist already
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# Vendor / ERP integration (swap provider without changing FinanceService)
ers.vendor.provider=mock-sap
ers.vendor.timeout-ms=3000
ers.vendor.max-attempts=3
ers.vendor.retry-backoff-ms=250
ers.vendor.mock-latency-ms=150
# Deterministic mock failures: ids divisible by N (0 = disabled)
ers.vendor.mock-fail-every-nth-id=7
ers.vendor.mock-timeout-every-nth-id=13
