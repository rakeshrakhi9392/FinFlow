spring.application.name=ERSBackend

# ---------------------------------------------------------------------------
# Local defaults (override with env vars or application-prod.properties)
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reimbursement}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# Schema (Neon / Cloud SQL: leave empty or set via SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA)
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_DEFAULT_SCHEMA:reimbursement_schema}
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

server.port=${PORT:8080}
server.servlet.session.cookie.same-site=${SERVER_SERVLET_SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SERVER_SERVLET_SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=${SERVER_SERVLET_SESSION_TIMEOUT:30m}

# CORS (comma-separated list supported via env ERS_CORS_ALLOWED_ORIGINS)
ers.cors.allowed-origins=${ERS_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
ers.api.server-url=${ERS_API_SERVER_URL:http://localhost:8080}

# ---------------------------------------------------------------------------
# Springdoc OpenAPI / Swagger UI
# ---------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true

# ---------------------------------------------------------------------------
# Spring Boot Actuator
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true
info.app.name=Employee Reimbursement System
info.app.description=Enterprise reimbursement workflow with budget engine and vendor integration
info.app.version=1.0.0
info.app.author=Madasu Rakesh

# ---------------------------------------------------------------------------
# Vendor / ERP integration
# ---------------------------------------------------------------------------
ers.vendor.provider=${ERS_VENDOR_PROVIDER:mock-sap}
ers.vendor.timeout-ms=${ERS_VENDOR_TIMEOUT_MS:3000}
ers.vendor.max-attempts=${ERS_VENDOR_MAX_ATTEMPTS:3}
ers.vendor.retry-backoff-ms=${ERS_VENDOR_RETRY_BACKOFF_MS:250}
ers.vendor.mock-latency-ms=${ERS_VENDOR_MOCK_LATENCY_MS:150}
ers.vendor.mock-fail-every-nth-id=${ERS_VENDOR_MOCK_FAIL_EVERY_NTH_ID:7}
ers.vendor.mock-timeout-every-nth-id=${ERS_VENDOR_MOCK_TIMEOUT_EVERY_NTH_ID:13}
