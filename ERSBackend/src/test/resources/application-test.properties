spring.datasource.url=jdbc:h2:mem:ers_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

ers.vendor.provider=mock-sap
ers.vendor.timeout-ms=2000
ers.vendor.max-attempts=2
ers.vendor.retry-backoff-ms=10
ers.vendor.mock-latency-ms=0
ers.vendor.mock-fail-every-nth-id=0
ers.vendor.mock-timeout-every-nth-id=0
